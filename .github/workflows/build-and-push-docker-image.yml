name: build-and-push-docker-image

on:
  workflow_dispatch:
  
  push:
    branches:
      - "main"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Docker Buildx（支持多平台构建和缓存优化）
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. 登录到 Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets::DOCKER_USERNAME }}
        password: ${{ secrets::DOCKER_TOKEN }}

    # 4. 提取元数据（自动生成标签，如 latest 和 commit 后的 SHA码）
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        # 替换为：你的DockerHub用户名/你的镜像仓库名
        images: ${{ secrets::DOCKER_USERNAME }}/my-app 
        tags: |
          type=raw,value=latest
          type=sha,format=short

    # 5. 构建并推送镜像
    - name: Build and push Docker image
      uses: docker/build-push-action@v6  # 2026年最新 V6 版本
      with:
        context: .
        file: ./app/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # 开启 GitHub 缓存，极大加快后续构建速度
        cache-from: type=gha
        cache-to: type=gha,mode=max
